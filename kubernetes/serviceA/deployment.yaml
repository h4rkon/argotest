apiVersion: apps/v1
kind: Deployment
metadata:
  name: servicea
  namespace: develop
  labels:
    app: servicea
spec:
  replicas: 1
  selector:
    matchLabels:
      app: servicea
  template:
    metadata:
      labels:
        app: servicea
    spec:
      containers:
        - name: servicea
          image: ghcr.io/h4rkon/servicea:develop-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /hello
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /hello
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 20
