apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: serviceb-develop
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/h4rkon/argotest.git
    targetRevision: develop
    path: kubernetes/serviceB/overlays/develop
  destination:
    server: https://kubernetes.default.svc
    namespace: develop
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
