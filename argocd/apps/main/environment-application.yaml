apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: main-environment
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/h4rkon/argotest.git
    targetRevision: main
    path: helm/argotest-environment
    helm:
      valueFiles:
        - ../../environments/main/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
