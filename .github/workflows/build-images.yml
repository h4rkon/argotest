name: Build Images

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      push_images:
        description: Push images to GHCR
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and Publish
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - serviceA
          - serviceB
    env:
      REGISTRY: ghcr.io
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve image naming
        id: meta
        shell: bash
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          service_image="$(echo "${{ matrix.service }}" | tr '[:upper:]' '[:lower:]')"
          echo "image_name=${REGISTRY}/${owner}/${service_image}" >> "${GITHUB_OUTPUT}"
          node scripts/resolve-image-version.js "${{ matrix.service }}" "${GITHUB_REF_NAME}" "${GITHUB_RUN_NUMBER}" >> "${GITHUB_OUTPUT}"

      - name: Login to GHCR
        if: github.event_name == 'push' || inputs.push_images
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and optionally push image
        uses: docker/build-push-action@v6
        with:
          context: ./services/${{ matrix.service }}
          file: ./services/${{ matrix.service }}/Dockerfile
          push: ${{ github.event_name == 'push' || inputs.push_images }}
          tags: |
            ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.version_tag }}
            ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.channel_tag }}

      - name: Workflow summary
        shell: bash
        run: |
          {
            echo "## ${{ matrix.service }}"
            echo
            echo "- Branch: \`${GITHUB_REF_NAME}\`"
            echo "- Version tag: \`${{ steps.meta.outputs.version_tag }}\`"
            echo "- Channel tag: \`${{ steps.meta.outputs.channel_tag }}\`"
            echo "- Image: \`${{ steps.meta.outputs.image_name }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
