name: Update Feature Environment

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Feature branch name (e.g. feature/OAS-4715)
        required: true
        type: string
      service:
        description: Service name to override
        required: true
        type: choice
        options:
          - servicea
          - serviceb
      image_tag:
        description: Image tag to apply (e.g. OAS-4715-latest or 1.0.0-OAS-4715.27)
        required: true
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update feature environment values
        run: |
          node scripts/update-feature-image.js "${{ inputs.branch }}" "${{ inputs.service }}" "${{ inputs.image_tag }}"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit changes
        run: |
          git add environments
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: update ${{ inputs.service }} for ${{ inputs.branch }} to ${{ inputs.image_tag }}"

      - name: Push to develop
        run: |
          git push origin HEAD:develop
